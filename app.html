<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code セキュリティ診断</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <!-- ===== ホーム画面 ===== -->
  <div id="screen-home" class="screen">
    <nav class="nav">
      <span class="nav-brand">
        <span class="nav-logo"></span>
        セキュリティ設定ナビ
      </span>
    </nav>
    <main class="home-main">
      <div class="home-card">
        <div class="home-badge">無料 · 登録不要 · 約5分</div>
        <h1 class="home-title">
          Claude Code の<br>セキュリティ設定、<br><em>大丈夫ですか？</em>
        </h1>
        <p class="home-desc">
          6つの質問に答えるだけで、あなたの利用状況に合ったセキュリティ設定と改善アドバイスがわかります。専門知識は一切不要です。
        </p>
        <button class="btn-start" id="btn-start">
          診断を始める
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <ul class="home-meta">
          <li>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            プログラミング知識ゼロでOK
          </li>
          <li>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            データはブラウザ内にのみ保存
          </li>
          <li>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            結果をPDFで保存・共有できる
          </li>
        </ul>
      </div>
    </main>
  </div>

  <!-- ===== 質問画面 ===== -->
  <div id="screen-question" class="screen" hidden>
    <div class="question-header">
      <button class="btn-back" id="btn-back" aria-label="前の質問に戻る">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        戻る
      </button>
      <div class="progress-wrap">
        <div class="progress-bar">
          <div class="progress-inner" id="progress-inner"></div>
        </div>
        <span class="progress-label" id="progress-label">1 / 6</span>
      </div>
    </div>

    <main class="question-main">
      <div class="question-card">
        <span class="q-step-label" id="q-step-label"></span>
        <h2 class="q-text" id="q-text"></h2>
        <p class="q-note" id="q-note"></p>
        <div class="choice-list" id="choice-list"></div>
      </div>
    </main>

    <div class="question-footer">
      <button class="btn-next" id="btn-next" disabled>
        次へ
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== 結果画面 ===== -->
  <div id="screen-result" class="screen" hidden>
    <div class="result-nav no-print">
      <span class="result-nav-brand">
        <span class="nav-logo"></span>
        診断結果レポート
      </span>
      <button class="btn-print" id="btn-print">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        PDF で保存
      </button>
    </div>

    <main class="result-main">
      <div id="result-content"></div>

      <div class="result-restart no-print">
        <button class="btn-secondary" id="btn-restart">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.67"/></svg>
          もう一度診断する
        </button>
      </div>
    </main>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
